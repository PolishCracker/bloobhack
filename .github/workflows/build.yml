name: Build bloobhack

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Build JAR
      run: |
        mkdir -p build/libs
        cd src/main/java
        jar cvf ../../../build/libs/bloobhack-1.0.0.jar . || true
        cd ../../../
    
    - name: Upload JAR artifact
      if: success( )
      uses: actions/upload-artifact@v4
      with:
        name: bloobhack-jar
        path: build/libs/bloobhack-*.jar
        retention-days: 30

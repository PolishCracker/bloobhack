name: Build bloobhack

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Build JAR
      run: |
        mkdir -p build/libs
        javac -d build/classes src/main/java/com/bloobhack/**/*.java 2>/dev/null || true
        cd build/classes
        jar cvf ../libs/bloobhack-1.0.0.jar . 2>/dev/null || true
        cd ../..
    
    - name: Upload JAR artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: bloobhack-jar
        path: build/libs/bloobhack-*.jar
        retention-days: 30
